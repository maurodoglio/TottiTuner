<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TottiTuner – String Instrument Tuner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🎸 TottiTuner</h1>
    <p>Tune your string instrument with ease</p>
  </header>

  <main>

    <!-- Instrument Selector -->
    <section class="card" aria-label="Instrument selection">
      <h2>Choose Instrument</h2>
      <select id="instrument-select" aria-label="Select instrument"></select>
      <ul id="strings-list" class="strings-grid" aria-label="String notes"></ul>
    </section>

    <!-- Tuner Meter -->
    <section class="tuner-meter" id="tuner-meter" aria-label="Tuner display">
      <div class="readout">
        <div id="note-display" aria-live="polite" aria-label="Detected note">--</div>
        <div class="readout-right">
          <div id="freq-display" aria-live="polite">-- Hz</div>
          <div id="cents-display" aria-live="polite">0¢</div>
        </div>
      </div>

      <!-- SVG Arc Gauge -->
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 280 140" aria-hidden="true">
          <!-- Background arc -->
          <path d="M 20 130 A 120 120 0 0 1 260 130"
                fill="none" stroke="#2a2a4a" stroke-width="14" stroke-linecap="round"/>

          <!-- Flat zone (left, red) -->
          <path d="M 20 130 A 120 120 0 0 1 80 25"
                fill="none" stroke="#e9455033" stroke-width="14" stroke-linecap="round"/>

          <!-- In-tune zone (center, green) -->
          <path d="M 119 14 A 120 120 0 0 1 161 14"
                fill="none" stroke="#00d4a033" stroke-width="14" stroke-linecap="round"/>

          <!-- Sharp zone (right, red) -->
          <path d="M 200 25 A 120 120 0 0 1 260 130"
                fill="none" stroke="#e9455033" stroke-width="14" stroke-linecap="round"/>

          <!-- Tick marks -->
          <!-- Center tick -->
          <line x1="140" y1="14" x2="140" y2="26" stroke="#00d4a0" stroke-width="2.5" stroke-linecap="round"/>
          <!-- -25¢ -->
          <line x1="72" y1="55" x2="79" y2="65" stroke="#7a7a9a" stroke-width="1.5" stroke-linecap="round"/>
          <!-- +25¢ -->
          <line x1="208" y1="55" x2="201" y2="65" stroke="#7a7a9a" stroke-width="1.5" stroke-linecap="round"/>
          <!-- -50¢ -->
          <line x1="27" y1="118" x2="37" y2="118" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>
          <!-- +50¢ -->
          <line x1="253" y1="118" x2="243" y2="118" stroke="#e94560" stroke-width="1.5" stroke-linecap="round"/>

          <!-- Labels -->
          <text class="gauge-label" x="10" y="115" text-anchor="middle">♭</text>
          <text class="gauge-label" x="270" y="115" text-anchor="middle">♯</text>
          <text class="gauge-label" x="140" y="10" text-anchor="middle" fill="#00d4a0" font-weight="bold">♩</text>

          <!-- Needle -->
          <g id="needle" style="transform-origin: 140px 130px; transform: rotate(0deg)">
            <line x1="140" y1="130" x2="140" y2="22"
                  stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="140" cy="130" r="6" fill="#e0e0e0"/>
            <circle cx="140" cy="130" r="3" fill="#0f0f1a"/>
          </g>
        </svg>
      </div>

      <div id="tuner-status" class="tuner-status" aria-live="polite">Press Start to begin</div>
    </section>

    <!-- Start / Stop button -->
    <button id="start-btn" class="btn-start" aria-pressed="false">Start Tuner</button>

  </main>

  <footer>
    <p>Uses your microphone to detect pitch in real time</p>
  </footer>

  <script src="tuner.js"></script>
</body>
</html>
